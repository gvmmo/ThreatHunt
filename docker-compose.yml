version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: threathunt_mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin123
    volumes:
      - mongodb_data:/data/db
    networks:
      - threathunt_network

volumes:
  mongodb_data:
    name: threathunt_mongodb_data

networks:
  threathunt_network:
    name: threathunt_network 
